<svg viewBox="10 0 240 250" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;margin:0 auto;display:block;">
  <defs>
    <filter id="g1" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feComponentTransfer in="b" result="b2">
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g3" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="orbitPath" d="M 58 130 A 72 18 0 1 0 202 130 A 72 18 0 1 0 58 130" />
    <mask id="imagine-text-gaps" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="260" height="260" fill="white"/>
      <rect x="70" y="110" width="120" height="55" fill="black" rx="2"/>
    </mask>
  </defs>

  <!-- LAYER 1 & 2: QUANTUM ORBITAL RINGS & ELECTRONS -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 130 130" to="360 130 130" dur="8s" repeatCount="indefinite" />
    <path d="M 58 130 A 72 18 0 1 0 202 130 A 72 18 0 1 0 58 130" fill="none" stroke="#00f5ff" stroke-width="0.8" opacity="0.25" />
    <path d="M 58 130 A 72 18 0 1 0 202 130 A 72 18 0 1 0 58 130" fill="none" stroke="#00f5ff" stroke-width="1.6" stroke-dasharray="30 114" stroke-dashoffset="0" opacity="0.8" filter="url(#g1)" />
    <circle cx="0" cy="0" r="3.5" fill="#00f5ff" opacity="0.95" filter="url(#g1)">
      <animateMotion dur="8s" repeatCount="indefinite">
        <mpath href="#orbitPath" />
      </animateMotion>
    </circle>
  </g>

  <g transform="rotate(60 130 130)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 130 130" to="360 130 130" dur="12s" repeatCount="indefinite" />
      <path d="M 58 130 A 72 18 0 1 0 202 130 A 72 18 0 1 0 58 130" fill="none" stroke="#00f5ff" stroke-width="0.8" opacity="0.25" />
      <path d="M 58 130 A 72 18 0 1 0 202 130 A 72 18 0 1 0 58 130" fill="none" stroke="#b94fff" stroke-width="1.6" stroke-dasharray="25 119" stroke-dashoffset="40" opacity="0.8" filter="url(#g1)" />
      <circle cx="0" cy="0" r="3.5" fill="#b94fff" opacity="0.95" filter="url(#g1)">
        <animateMotion dur="12s" repeatCount="indefinite">
          <mpath href="#orbitPath" />
        </animateMotion>
      </circle>
    </g>
  </g>

  <g transform="rotate(120 130 130)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 130 130" to="360 130 130" dur="16s" repeatCount="indefinite" />
      <path d="M 58 130 A 72 18 0 1 0 202 130 A 72 18 0 1 0 58 130" fill="none" stroke="#00f5ff" stroke-width="0.8" opacity="0.25" />
      <path d="M 58 130 A 72 18 0 1 0 202 130 A 72 18 0 1 0 58 130" fill="none" stroke="#39ff88" stroke-width="1.6" stroke-dasharray="20 124" stroke-dashoffset="80" opacity="0.75" filter="url(#g1)" />
      <circle cx="0" cy="0" r="3.5" fill="#39ff88" opacity="0.95" filter="url(#g1)">
        <animateMotion dur="16s" repeatCount="indefinite">
          <mpath href="#orbitPath" />
        </animateMotion>
      </circle>
    </g>
  </g>

  <!-- LAYER 4: NEURAL NET CONNECTION LINES -->
  <line x1="130" y1="35" x2="212" y2="82" stroke="#b94fff" stroke-width="0.4" opacity="0.12" />
  <line x1="212" y1="82" x2="212" y2="178" stroke="#b94fff" stroke-width="0.4" opacity="0.12" />
  <line x1="212" y1="178" x2="130" y2="225" stroke="#b94fff" stroke-width="0.4" opacity="0.12" />
  <line x1="130" y1="225" x2="48" y2="178" stroke="#b94fff" stroke-width="0.4" opacity="0.12" />
  <line x1="48" y1="178" x2="48" y2="82" stroke="#b94fff" stroke-width="0.4" opacity="0.12" />
  <line x1="48" y1="82" x2="130" y2="35" stroke="#b94fff" stroke-width="0.4" opacity="0.12" />

  <line x1="130" y1="35" x2="130" y2="100" stroke="#b94fff" stroke-width="0.5" opacity="0.05">
    <animate attributeName="opacity" values="0.05; 0.35; 0.05" dur="2s" begin="0s" repeatCount="indefinite"/>
  </line>
  <line x1="212" y1="82" x2="165" y2="107" stroke="#b94fff" stroke-width="0.5" opacity="0.05">
    <animate attributeName="opacity" values="0.05; 0.35; 0.05" dur="2s" begin="-1.7s" repeatCount="indefinite"/>
  </line>
  <line x1="212" y1="178" x2="165" y2="153" stroke="#b94fff" stroke-width="0.5" opacity="0.05">
    <animate attributeName="opacity" values="0.05; 0.35; 0.05" dur="2s" begin="-1.4s" repeatCount="indefinite"/>
  </line>
  <line x1="130" y1="225" x2="130" y2="160" stroke="#b94fff" stroke-width="0.5" opacity="0.05">
    <animate attributeName="opacity" values="0.05; 0.35; 0.05" dur="2s" begin="-1.1s" repeatCount="indefinite"/>
  </line>
  <line x1="48" y1="178" x2="95" y2="153" stroke="#b94fff" stroke-width="0.5" opacity="0.05">
    <animate attributeName="opacity" values="0.05; 0.35; 0.05" dur="2s" begin="-0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="48" y1="82" x2="95" y2="107" stroke="#b94fff" stroke-width="0.5" opacity="0.05">
    <animate attributeName="opacity" values="0.05; 0.35; 0.05" dur="2s" begin="-0.5s" repeatCount="indefinite"/>
  </line>

  <!-- LAYER 3: NEURAL NET OUTER NODES -->
  <circle cx="130" cy="35" r="4" fill="#1b2b44" stroke="#b94fff" stroke-width="1.5">
    <animate attributeName="r" values="4; 6.4; 4" dur="2.4s" begin="0s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5; 1.0; 0.5" dur="2.4s" begin="0s" repeatCount="indefinite" />
  </circle>
  <circle cx="212" cy="82" r="4" fill="#1b2b44" stroke="#b94fff" stroke-width="1.5">
    <animate attributeName="r" values="4; 6.4; 4" dur="2.4s" begin="-2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5; 1.0; 0.5" dur="2.4s" begin="-2s" repeatCount="indefinite" />
  </circle>
  <circle cx="212" cy="178" r="4" fill="#1b2b44" stroke="#b94fff" stroke-width="1.5">
    <animate attributeName="r" values="4; 6.4; 4" dur="2.4s" begin="-1.6s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5; 1.0; 0.5" dur="2.4s" begin="-1.6s" repeatCount="indefinite" />
  </circle>
  <circle cx="130" cy="225" r="4" fill="#1b2b44" stroke="#b94fff" stroke-width="1.5">
    <animate attributeName="r" values="4; 6.4; 4" dur="2.4s" begin="-1.2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5; 1.0; 0.5" dur="2.4s" begin="-1.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="48" cy="178" r="4" fill="#1b2b44" stroke="#b94fff" stroke-width="1.5">
    <animate attributeName="r" values="4; 6.4; 4" dur="2.4s" begin="-0.8s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5; 1.0; 0.5" dur="2.4s" begin="-0.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="48" cy="82" r="4" fill="#1b2b44" stroke="#b94fff" stroke-width="1.5">
    <animate attributeName="r" values="4; 6.4; 4" dur="2.4s" begin="-0.4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5; 1.0; 0.5" dur="2.4s" begin="-0.4s" repeatCount="indefinite" />
  </circle>

  <!-- LAYER 5: INNER CORE -->
  <!-- Base to block underlying elements showing through. Replaced the flat color with site theme main BG matching -->
  <circle cx="130" cy="130" r="70" fill="#040a14" opacity="1" />
  <circle cx="130" cy="130" r="70" fill="none" stroke="#00f5ff" stroke-width="0.5" opacity="0.15" filter="url(#g3)" />

  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 130 130" to="360 130 130" dur="20s" repeatCount="indefinite" />
    <circle cx="130" cy="130" r="67" fill="none" stroke="#00f5ff" stroke-width="0.84" opacity="0.3" />
  </g>
  <circle cx="130" cy="130" r="62" fill="none" stroke="#00f5ff" stroke-width="1.96" opacity="0.6" filter="url(#g1)">
     <animate attributeName="opacity" values="0.4; 0.9; 0.4" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- LAYER 6: CARDINAL TICK MARKS -->
  <line x1="130" y1="59" x2="130" y2="64" stroke="#00f5ff" stroke-width="2.1" opacity="0.2">
    <animate attributeName="opacity" values="0.2; 1.0; 0.2" dur="2s" begin="0s" repeatCount="indefinite" />
  </line>
  <line x1="196" y1="130" x2="201" y2="130" stroke="#00f5ff" stroke-width="2.1" opacity="0.2">
    <animate attributeName="opacity" values="0.2; 1.0; 0.2" dur="2s" begin="0.5s" repeatCount="indefinite" />
  </line>
  <line x1="130" y1="196" x2="130" y2="201" stroke="#00f5ff" stroke-width="2.1" opacity="0.2">
    <animate attributeName="opacity" values="0.2; 1.0; 0.2" dur="2s" begin="1.0s" repeatCount="indefinite" />
  </line>
  <line x1="59" y1="130" x2="64" y2="130" stroke="#00f5ff" stroke-width="2.1" opacity="0.2">
    <animate attributeName="opacity" values="0.2; 1.0; 0.2" dur="2s" begin="1.5s" repeatCount="indefinite" />
  </line>

  <!-- LAYER 7: AA TEXT -->
  <g transform="translate(130, 153)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="0.85; 1.0" dur="1.2s" fill="freeze" />
      <text x="0" y="0" font-family="'Orbitron', 'QuirkyRobot', sans-serif" font-size="62" font-weight="900" fill="#e8f4ff" text-anchor="middle" letter-spacing="1" filter="url(#g2)" opacity="0">
        <animate attributeName="opacity" values="0; 0.97" dur="1.2s" fill="freeze" />
        <animate attributeName="opacity" values="0.85; 0.97; 0.85" begin="1.2s" dur="4s" repeatCount="indefinite" />
        AA
      </text>
    </g>
  </g>

  <!-- LAYER 8: SCAN LINE -->
  <line x1="81" y1="160" x2="179" y2="160" stroke="#00f5ff" stroke-width="0.84" opacity="0.35" mask="url(#imagine-text-gaps)">
     <animate attributeName="x1" values="81; 130; 81" dur="3s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
     <animate attributeName="x2" values="179; 130; 179" dur="3s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
  </line>

</svg>
